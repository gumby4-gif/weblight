<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Schedule — Wu's Tai Chi Chuan Academy Detroit</title>
  <meta name="description" content="Current class schedule for Wu's Tai Chi Chuan Academy Detroit — Ferndale, MI.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="site.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="styles.css">
</head>

<body data-page="schedule">

<div id="site-header"></div>
<script>loadFragment("header.html", "site-header");</script>

<div class="page-hero schedule-page-hero">
  <p class="zen-eyebrow" style="text-align:center;margin-bottom:10px;">課程表</p>
  <h2>Class Schedule</h2>
  <p>Current schedule for the 2026–2027 year</p>
</div>

<div class="sub-nav">
  <a href="index.html#top" class="back-home"><img src="Images/Tai_Chi_Home.png" width="50" height="50" alt="Home"></a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html" class="active">📅 Schedule</a>
    <a href="Fees.html">💰 Fees</a>
    <a href="Events.html">🎉 Events</a>
  </nav>
</div>

<main id="schedule-main" class="page-main fade-in">
  <p style="color:var(--charcoal-mid);text-align:center;">Loading schedule…</p>
</main>

<div id="site-footer"></div>
<script>loadFragment("footer.html", "site-footer");</script>

<script>
fetch("schedule.json")
  .then(function(response) {
    if (!response.ok) throw new Error("Could not load schedule.json (HTTP " + response.status + ")");
    return response.json();
  })
  .then(function(data) {
    buildSchedule(data);
  })
  .catch(function(err) {
    var main = document.getElementById('schedule-main');
    main.innerHTML = '';

    var errDiv = document.createElement('div');
    errDiv.className = 'load-error';
    var strong = document.createElement('strong');
    strong.textContent = 'Schedule could not be loaded.';
    errDiv.appendChild(strong);
    errDiv.appendChild(document.createElement('br'));
    errDiv.appendChild(document.createTextNode('Please check that schedule.json is in the same folder and contains valid JSON.'));
    errDiv.appendChild(document.createElement('br'));
    var small = document.createElement('small');
    small.style.opacity = '0.7';
    small.textContent = err.message;
    errDiv.appendChild(small);
    main.appendChild(errDiv);

    var infoBox = document.createElement('div');
    infoBox.className = 'info-box';
    infoBox.style.marginTop = '20px';
    infoBox.textContent = '📍 3140 Hilton Road, Ferndale, MI 48220 · 📞 248-854-3953';
    main.appendChild(infoBox);
  });

function buildSchedule(data) {
  var main = document.getElementById('schedule-main');
  main.innerHTML = '';

  data.days.forEach(function(dayObj) {
    var block = document.createElement('div');
    block.className = 'day-block';

    var dayHeader = document.createElement('div');
    dayHeader.className = 'day-header';
    var h3 = document.createElement('h3');
    h3.textContent = dayObj.day;
    dayHeader.appendChild(h3);
    block.appendChild(dayHeader);

    dayObj.classes.forEach(function(cls) {
      var row = document.createElement('div');
      row.className = 'class-row';

      var time = document.createElement('span');
      time.className   = 'class-time';
      time.textContent = cls.time;

      var name = document.createElement('span');
      name.className   = 'class-name';
      name.textContent = cls.name;

      row.appendChild(time);
      row.appendChild(name);

      if (cls.note) {
        var note = document.createElement('span');
        note.className   = 'class-note';
        note.textContent = cls.note;
        row.appendChild(note);
      }

      block.appendChild(row);
    });

    main.appendChild(block);
  });
}

</script>

</body>
</html>
