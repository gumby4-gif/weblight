<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wu Tai Chi Chuan Academy Detroit — Schedule</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="preload" href="header.html" as="fetch" crossorigin>

  <style>
    :root{--gold:#B8954A;--gold-mid:#D4A85A;--gold-pale:#F7F0DC;--gold-softer:#EDE0BC;--ink:#1E1E1E;--ink-soft:#3A3A3A;--mid:#7A7260;--bg:#FAF6EC;--white:#FFFFFF;--border:#DDD0A8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lato',sans-serif;color:var(--ink);background:var(--bg);line-height:1.7;}

    header{background:var(--bg);border-bottom:2px solid var(--gold-softer);display:flex;align-items:center;padding:16px 40px;gap:14px;}
    .header-brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .header-brand img{width:46px;height:46px;object-fit:contain;}
    .header-brand-text h1{font-family:'Noto Serif SC',serif;font-size:1.05rem;color:var(--ink);line-height:1.3;font-weight:700;}
    .header-brand-text p{font-size:0.74rem;color:var(--mid);letter-spacing:0.06em;text-transform:uppercase;}

    .sub-nav{background:var(--gold-pale);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;}
    .back-home{font-size:0.82rem;color:var(--mid);text-decoration:none;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;margin-right:8px;}
    .back-home:visited{color:var(--mid);}
    .back-home:hover{color:var(--ink);}
    .divider-dot{color:var(--border);font-size:1rem;}
    .page-tabs{display:inline-flex;background:var(--white);border:1px solid var(--border);border-radius:50px;padding:4px;gap:3px;}
    .page-tabs a{display:inline-block;padding:8px 22px;border-radius:50px;text-decoration:none;font-size:0.84rem;font-weight:700;color:var(--ink-soft);transition:background 0.2s,color 0.2s;}
    .page-tabs a:visited{color:var(--ink-soft);}
    .page-tabs a:hover{background:var(--gold-softer);color:var(--ink);}
    .page-tabs a.active{background:var(--ink);color:#E8D58A;}

    .page-hero{background:linear-gradient(160deg,#C8A870,#DECAA5);padding:44px 40px 36px;text-align:center;}
    .page-hero h2{font-family:'Noto Serif SC',serif;font-size:clamp(1.5rem,3vw,2rem);color:#2A1F0A;margin-bottom:6px;}
    .page-hero p{color:#3A2A10;font-size:0.92rem;}

    main{max-width:780px;margin:0 auto;padding:50px 30px 60px;}
    .day-block{margin-bottom:38px;}
    .day-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
    .day-header h3{font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--ink);white-space:nowrap;}
    .day-header::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
    .class-row{display:flex;align-items:center;padding:13px 18px;background:var(--white);border:1px solid var(--border);border-radius:6px;margin-bottom:7px;gap:16px;transition:box-shadow 0.2s;}
    .class-row:hover{box-shadow:0 3px 14px rgba(0,0,0,0.06);}
    .class-time{font-weight:700;font-size:0.88rem;color:var(--gold);min-width:160px;font-family:'Lato',sans-serif;}
    .class-name{font-size:0.93rem;color:var(--ink-soft);}
    .class-note{margin-left:auto;font-size:0.78rem;color:var(--mid);font-style:italic;}
    .info-box{background:var(--gold-pale);border:1px solid var(--border);border-radius:6px;padding:15px 20px;font-size:0.88rem;color:var(--ink-soft);margin-top:8px;}

    /* Error state */
    .load-error{background:#fff5f5;border:1px solid #e8b4b4;border-radius:6px;padding:20px;color:#8B2020;font-size:0.9rem;text-align:center;}

    footer{background:#C8B088;color:#2A1F0A;text-align:center;padding:20px;font-size:0.82rem;border-top:1px solid #C0A070;}

  @media (max-width: 768px) {
    header { padding: 12px 20px; } /* removed flex-wrap: wrap so hamburger stays on same line */
    .header-brand-text h1 { font-size: 0.78rem; }
    .header-brand-text p { display: none; }
    .header-brand img { width: 38px; height: 38px; }
    header nav { display: none; flex-direction: column; width: 100%; gap: 0; }
    header nav.open { display: flex; }
    header nav a { padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }
    .nav-toggle { display: block; }
  }
  </style>
</head>

<body>
<script>
  fetch('header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.body.insertAdjacentHTML('afterbegin', html);
      /* insertAdjacentHTML does NOT execute <script> tags, so we
         re-run any scripts that were inside the fetched fragment. */
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      tmp.querySelectorAll('script').forEach(function(oldScript) {
        var newScript = document.createElement('script');
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        document.head.appendChild(newScript);
        document.head.removeChild(newScript);
      });
    });
</script>


<div class="sub-nav">
  <a href="index.html#top" class="back-home">
    <img src="Images/Tai_Chi_Home.png" width="50" height="50" alt="Home">
  </a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html" class="active">📅 Schedule</a>
    <a href="Fees.html">💰 Fees</a>
    <a href="Events.html">🎉 Events</a>
  </nav>
</div>

<div class="page-hero">
  <h2>Class Schedule</h2>
  <p>Current schedule for the 2026–2027 year</p>
</div>

<main id="schedule-main">
  <!-- Schedule is built here by JavaScript reading schedule.json -->
  <p style="color:var(--mid);text-align:center;">Loading schedule…</p>
</main>

<footer>© <span id="year"></span> Wu's Tai Chi Chuan Academy Detroit</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

// ── Fetch and render schedule.json ──────────────────────────────────────────
// The data lives in schedule.json (same folder as this file).
// A non-designer can edit that file without touching any HTML or CSS here.

fetch("schedule.json")
  .then(function(response) {
    if (!response.ok) throw new Error("Could not load schedule.json (HTTP " + response.status + ")");
    return response.json();
  })
  .then(function(data) {
    buildSchedule(data);
  })
  .catch(function(err) {
    document.getElementById("schedule-main").innerHTML =
      '<div class="load-error">' +
        '<strong>Schedule could not be loaded.</strong><br>' +
        'Please check that <code>schedule.json</code> is in the same folder as this page and contains valid JSON.<br>' +
        '<small style="opacity:0.7">' + err.message + '</small>' +
      '</div>' +
      '<div class="info-box" style="margin-top:20px">📍 3140 Hilton Road, Ferndale, MI 48220 &nbsp;·&nbsp; 📞 248-854-3953</div>';
  });

function buildSchedule(data) {
  var main = document.getElementById("schedule-main");
  var html = "";

  // Loop over each day in the JSON
  data.days.forEach(function(dayObj) {
    html += '<div class="day-block">';
    html += '<div class="day-header"><h3>' + escHtml(dayObj.day) + '</h3></div>';

    // Loop over each class for that day
    dayObj.classes.forEach(function(cls) {
      var noteHtml = cls.note
        ? '<span class="class-note">' + escHtml(cls.note) + '</span>'
        : "";
      html +=
        '<div class="class-row">' +
          '<span class="class-time">'  + escHtml(cls.time) + '</span>' +
          '<span class="class-name">'  + escHtml(cls.name) + '</span>' +
          noteHtml +
        '</div>';
    });

    html += '</div>'; // end day-block
  });

  // Contact info box always at the bottom
  html += '<div class="info-box">📍 3140 Hilton Road, Ferndale, MI 48220 &nbsp;·&nbsp; 📞 248-854-3953</div>';

  main.innerHTML = html;
}

// Simple HTML-escape so stray characters in the JSON can't break the page
function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>

</body>
</html>
