<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Schedule — Wu's Tai Chi Chuan Academy Detroit</title>
  <meta name="description" content="Current class schedule for Wu's Tai Chi Chuan Academy Detroit — Ferndale, MI.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="styles.css">
</head>

<body data-page="schedule">

<div id="site-header"></div>
<script>
  fetch('header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      var el = document.getElementById('site-header');
      el.innerHTML = html;
      el.querySelectorAll('script').forEach(function(orig) {
        var s = document.createElement('script');
        s.textContent = orig.textContent;
        document.head.appendChild(s);
      });
    });
</script>

<div class="page-hero schedule-page-hero">
  <p class="zen-eyebrow" style="text-align:center;margin-bottom:10px;">課程表</p>
  <h2>Class Schedule</h2>
  <p>Current schedule for the 2026–2027 year</p>
</div>

<div class="sub-nav">
  <a href="index.html#top" class="back-home"><img src="Images/Tai_Chi_Home.png" width="50" height="50" alt="Home"></a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html" class="active">📅 Schedule</a>
    <a href="Fees.html">💰 Fees</a>
    <a href="Events.html">🎉 Events</a>
  </nav>
</div>

<main id="schedule-main" class="page-main">
  <p style="color:var(--charcoal-mid);text-align:center;">Loading schedule…</p>
</main>

<div id="site-footer"></div>
<script>
  fetch('footer.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.getElementById('site-footer').innerHTML = html;
    });
</script>

<script>
fetch("schedule.json")
  .then(function(response) {
    if (!response.ok) throw new Error("Could not load schedule.json (HTTP " + response.status + ")");
    return response.json();
  })
  .then(function(data) {
    buildSchedule(data);
  })
  .catch(function(err) {
    document.getElementById("schedule-main").innerHTML =
      '<div class="load-error">' +
        '<strong>Schedule could not be loaded.</strong><br>' +
        'Please check that <code>schedule.json</code> is in the same folder as this page and contains valid JSON.<br>' +
        '<small style="opacity:0.7">' + err.message + '</small>' +
      '</div>' +
      '<div class="info-box" style="margin-top:20px">📍 3140 Hilton Road, Ferndale, MI 48220 &nbsp;·&nbsp; 📞 248-854-3953</div>';
  });

function buildSchedule(data) {
  var main = document.getElementById("schedule-main");
  var html = "";

  data.days.forEach(function(dayObj) {
    html += '<div class="day-block">';
    html += '<div class="day-header"><h3>' + escHtml(dayObj.day) + '</h3></div>';

    dayObj.classes.forEach(function(cls) {
      var noteHtml = cls.note
        ? '<span class="class-note">' + escHtml(cls.note) + '</span>'
        : "";
      html +=
        '<div class="class-row">' +
          '<span class="class-time">'  + escHtml(cls.time) + '</span>' +
          '<span class="class-name">'  + escHtml(cls.name) + '</span>' +
          noteHtml +
        '</div>';
    });

    html += '</div>';
  });

  main.innerHTML = html;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>

</body>
</html>
