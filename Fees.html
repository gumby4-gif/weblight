<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wu Tai Chi Chuan Academy Detroit — Fees</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<script>
  fetch('header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.body.insertAdjacentHTML('afterbegin', html);
      /* insertAdjacentHTML does NOT execute <script> tags, so we
         re-run any scripts that were inside the fetched fragment. */
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      tmp.querySelectorAll('script').forEach(function(oldScript) {
        var newScript = document.createElement('script');
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        document.head.appendChild(newScript);
        document.head.removeChild(newScript);
      });
    });
</script>

<div class="sub-nav">
  <a href="index.html#top" class="back-home"><img src="Images/Tai_Chi_Home.png" width="50" height="50" alt="Home"></a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html">📅 Schedule</a>
    <a href="Fees.html" class="active">💰 Fees</a>
    <a href="Events.html">🎉 Events</a>
  </nav>
</div>
<div class="page-hero">
  <h2 id="hero-title">Class Fees</h2>
  <p id="hero-subtitle">Monthly rates and class pricing</p>
</div>
<main id="fees-main" class="page-main">
  <div class="loading">Loading fees…</div>
</main>
<footer>© <span id="year"></span> Wu's Tai Chi Chuan Academy Detroit</footer>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  fetch('fees-data.json')
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(data => render(data))
    .catch(err => {
      document.getElementById('fees-main').innerHTML =
        '<div class="error"><strong>Could not load fees data.</strong> Make sure <code>fees-data.json</code> is in the same folder as this page. (' + err.message + ')</div>';
    });

  function render(data) {
    document.getElementById('hero-title').textContent    = data.heroTitle    || 'Class Fees';
    document.getElementById('hero-subtitle').textContent = data.heroSubtitle || '';
    var html = '';
    if (data.notice) html += '<div class="notice">' + data.notice + '</div>';
    (data.groups || []).forEach(function(group) {
      html += '<div class="fee-group"><div class="fee-group-label">' + group.label + '</div>';
      (group.items || []).forEach(function(item) {
        html += '<div class="fee-row"><span class="fee-label">' + item.name + '</span><span class="fee-amount">' + item.price + '</span></div>';
      });
      html += '</div>';
    });
    document.getElementById('fees-main').innerHTML = html;
  }
</script>
</body>
</html>
