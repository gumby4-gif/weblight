<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Fees — Wu's Tai Chi Chuan Academy Detroit</title>
  <meta name="description" content="Monthly rates and class pricing for Wu's Tai Chi Chuan Academy Detroit.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="site.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-zen.css">
  <style>
    .fees-page-hero {
      background: linear-gradient(160deg, #1E1A12 0%, #2E2416 100%);
      color: rgba(255,255,255,0.88);
    }
    .fees-page-hero h2 { color: #fff; }
    .fees-page-hero p  { color: rgba(255,255,255,0.62); }
  </style>
</head>

<body data-page="fees">

<div id="site-header"></div>
<script>loadFragment("header.html", "site-header");</script>

<div class="page-hero fees-page-hero">
  <p class="zen-eyebrow" style="text-align:center;margin-bottom:10px;">學費</p>
  <h2 id="hero-title">Class Fees</h2>
  <p id="hero-subtitle">Monthly rates and class pricing</p>
</div>

<div class="sub-nav">
  <a href="index.html#top" class="back-home"><img src="Images/Tai_Chi_Home.png" width="50" height="50" alt="Home"></a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html">📅 Schedule</a>
    <a href="Fees.html" class="active">💰 Fees</a>
    <a href="Events.html">🎉 Events</a>
  </nav>
</div>

<main id="fees-main" class="page-main fade-in">
  <div class="loading">Loading fees…</div>
</main>

<div id="site-footer"></div>
<script>loadFragment("footer.html", "site-footer");</script>

<script>
  fetch('fees-data.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) { render(data); })
    .catch(function(err) {
      var main = document.getElementById('fees-main');
      var div  = document.createElement('div');
      div.className = 'error';
      var strong = document.createElement('strong');
      strong.textContent = 'Could not load fees data.';
      div.appendChild(strong);
      div.appendChild(document.createTextNode(' Check that fees-data.json is in the same folder. (' + err.message + ')'));
      main.innerHTML = '';
      main.appendChild(div);
    });

  /* Safely render a notice string that may contain <strong> tags only */
  function renderNotice(text) {
    var div = document.createElement('div');
    div.className = 'notice';
    /* Split on <strong>...</strong> and build nodes safely */
    var parts = text.split(/(<strong>[^<]*<\/strong>)/);
    parts.forEach(function(part) {
      var m = part.match(/^<strong>([^<]*)<\/strong>$/);
      if (m) {
        var s = document.createElement('strong');
        s.textContent = m[1];
        div.appendChild(s);
      } else {
        div.appendChild(document.createTextNode(part));
      }
    });
    return div;
  }

  function render(data) {
    document.getElementById('hero-title').textContent    = data.heroTitle    || 'Class Fees';
    document.getElementById('hero-subtitle').textContent = data.heroSubtitle || '';

    var main = document.getElementById('fees-main');
    main.innerHTML = '';

    if (data.notice) {
      main.appendChild(renderNotice(data.notice));
    }

    (data.groups || []).forEach(function(group) {
      var groupDiv = document.createElement('div');
      groupDiv.className = 'fee-group';

      var label = document.createElement('div');
      label.className   = 'fee-group-label';
      label.textContent = group.label;
      groupDiv.appendChild(label);

      (group.items || []).forEach(function(item) {
        var row = document.createElement('div');
        row.className = 'fee-row';

        var lbl = document.createElement('span');
        lbl.className   = 'fee-label';
        lbl.textContent = item.name;

        var amt = document.createElement('span');
        amt.className   = 'fee-amount';
        amt.textContent = item.price;

        row.appendChild(lbl);
        row.appendChild(amt);
        groupDiv.appendChild(row);
      });

      main.appendChild(groupDiv);
    });
  }
</script>

</body>
</html>
