<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Fees — Wu's Tai Chi Chuan Academy Detroit</title>
  <meta name="description" content="Monthly rates and class pricing for Wu's Tai Chi Chuan Academy Detroit.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="styles.css">
</head>

<body data-page="schedule">

<div id="site-header"></div>
<script>
  fetch('header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      var el = document.getElementById('site-header');
      el.innerHTML = html;
      el.querySelectorAll('script').forEach(function(orig) {
        var s = document.createElement('script');
        s.textContent = orig.textContent;
        document.head.appendChild(s);
      });
    });
</script>

<div class="page-hero fees-page-hero">
  <p class="zen-eyebrow" style="text-align:center;margin-bottom:10px;">學費</p>
  <h2 id="hero-title">Class Fees</h2>
  <p id="hero-subtitle">Monthly rates and class pricing</p>
</div>

<div class="sub-nav">
  <a href="index.html#top" class="back-home"><img src="Images/Tai_Chi_Home.png" width="50" height="50" alt="Home"></a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html">📅 Schedule</a>
    <a href="Fees.html" class="active">💰 Fees</a>
    <a href="Events.html">🎉 Events</a>
  </nav>
</div>

<main id="fees-main" class="page-main">
  <div class="loading">Loading fees…</div>
</main>

<div id="site-footer"></div>
<script>
  fetch('footer.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.getElementById('site-footer').innerHTML = html;
    });
</script>

<script>
  fetch('fees-data.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) { render(data); })
    .catch(function(err) {
      document.getElementById('fees-main').innerHTML =
        '<div class="error"><strong>Could not load fees data.</strong> Make sure <code>fees-data.json</code> is in the same folder as this page. (' + err.message + ')</div>';
    });

  function render(data) {
    document.getElementById('hero-title').textContent    = data.heroTitle    || 'Class Fees';
    document.getElementById('hero-subtitle').textContent = data.heroSubtitle || '';
    var html = '';
    if (data.notice) html += '<div class="notice">' + data.notice + '</div>';
    (data.groups || []).forEach(function(group) {
      html += '<div class="fee-group"><div class="fee-group-label">' + group.label + '</div>';
      (group.items || []).forEach(function(item) {
        html += '<div class="fee-row"><span class="fee-label">' + item.name + '</span><span class="fee-amount">' + item.price + '</span></div>';
      });
      html += '</div>';
    });
    document.getElementById('fees-main').innerHTML = html;
  }
</script>

</body>
</html>
