<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Events — Wu's Tai Chi Chuan Academy Detroit</title>
  <meta name="description" content="Community gatherings, celebrations and special occasions at Wu's Tai Chi Chuan Academy Detroit.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="site.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-zen.css">
  <style>
    .events-page-hero {
      background: linear-gradient(160deg, #1E1A12 0%, #2E2416 100%);
      color: rgba(255,255,255,0.88);
    }
    .events-page-hero h2 { color: #fff; }
    .events-page-hero p  { color: rgba(255,255,255,0.62); }

    .event-card {
      background: #fff;
      border: 1px solid var(--heritage-border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 32px;
      transition: box-shadow 0.25s;
    }
    .event-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.09); }
    .event-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--heritage-border);
    }
    .event-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 2px;
      margin-bottom: 10px;
      background: var(--crimson-pale);
      color: var(--crimson);
      border: 1px solid rgba(155,27,27,0.18);
    }
    .event-header h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.15rem;
      color: var(--ink-black);
      margin-bottom: 10px;
    }
    .event-header p {
      font-size: 0.95rem;
      color: var(--charcoal);
      line-height: 1.75;
    }
    .featured-img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      display: block;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 3px;
      padding: 3px;
    }
    .photo-grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      border-radius: 2px;
    }
  </style>
</head>

<body data-page="events">

<div id="site-header"></div>
<script>loadFragment("header.html", "site-header");</script>

<div class="page-hero events-page-hero">
  <p class="zen-eyebrow" style="text-align:center;margin-bottom:10px;">活動</p>
  <h1 id="hero-title">Events</h1>
  <p id="hero-subtitle">Community gatherings, celebrations &amp; special occasions</p>
</div>

<div class="sub-nav">
  <a href="index.html" class="back-home" aria-label="Return to home page">← Home</a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html">📅 Schedule</a>
    <a href="Fees.html">💰 Fees</a>
    <a href="Events.html" class="active">🎉 Events</a>
  </nav>
</div>

<div id="main-content"></div>
<main id="events-main" class="page-main fade-in" aria-label="Events">
  <div class="loading">Loading events…</div>
</main>

<div id="site-footer"></div>
<script>loadFragment("footer.html", "site-footer");</script>

<script>
  fetch('events-data.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) { render(data); })
    .catch(function(err) {
      var main = document.getElementById('events-main');
      var div  = document.createElement('div');
      div.className = 'error';
      var strong = document.createElement('strong');
      strong.textContent = 'Could not load events data.';
      div.appendChild(strong);
      div.appendChild(document.createTextNode(' Check that events-data.json is in the same folder. (' + err.message + ')'));
      main.innerHTML = '';
      main.appendChild(div);
    });

  function render(data) {
    document.getElementById('hero-title').textContent    = data.heroTitle    || 'Events';
    document.getElementById('hero-subtitle').textContent = data.heroSubtitle || '';

    var main = document.getElementById('events-main');
    main.innerHTML = '';

    var events = data.events || [];
    if (!events.length) {
      var empty = document.createElement('p');
      empty.style.cssText = 'color:var(--charcoal-mid);text-align:center;padding:40px 0;';
      empty.textContent = 'No events yet — check back soon.';
      main.appendChild(empty);
      return;
    }

    events.forEach(function(ev) {
      var card   = document.createElement('div');
      card.className = 'event-card';

      /* header section */
      var header = document.createElement('div');
      header.className = 'event-header';

      if (ev.tag) {
        var tag = document.createElement('div');
        tag.className   = 'event-tag';
        tag.textContent = ev.tag;
        header.appendChild(tag);
      }
      if (ev.title) {
        var h3 = document.createElement('h3');
        h3.textContent = ev.title;
        header.appendChild(h3);
      }
      if (ev.description) {
        var p = document.createElement('p');
        p.textContent = ev.description;
        header.appendChild(p);
      }
      card.appendChild(header);

      /* featured image */
      if (ev.featuredImage && ev.featuredImage.src) {
        var img = document.createElement('img');
        img.src       = ev.featuredImage.src;
        img.alt       = ev.featuredImage.alt || '';
        img.className = 'featured-img';
        card.appendChild(img);
      }

      /* photo grid */
      if (ev.photos && ev.photos.length) {
        var grid = document.createElement('div');
        grid.className = 'photo-grid';
        ev.photos.forEach(function(photo) {
          var pImg = document.createElement('img');
          pImg.src = photo.src;
          pImg.alt = photo.alt || '';
          grid.appendChild(pImg);
        });
        card.appendChild(grid);
      }

      main.appendChild(card);
    });
  }
</script>

</body>
</html>
