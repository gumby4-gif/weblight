<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wu Tai Chi Chuan Academy Detroit — Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <script>
    fetch('header.html')
      .then(function(r){ return r.text(); })
      .then(function(html){
        document.body.insertAdjacentHTML('afterbegin', html);
        /* insertAdjacentHTML does NOT execute <script> tags, so we
           re-run any scripts that were inside the fetched fragment. */
        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        tmp.querySelectorAll('script').forEach(function(oldScript) {
          var newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.head.appendChild(newScript);
          document.head.removeChild(newScript);
        });
      });
</script>



<div class="sub-nav">
  <a href="index.html#top" class="back-home"><img src="Images/Tai_Chi_Home.png" width="50" height="50" alt="Home"></a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html">📅 Schedule</a>
    <a href="Fees.html">💰 Fees</a>
    <a href="Events.html" class="active">🎉 Events</a>
  </nav>
</div>

<div class="page-hero">
  <h2 id="hero-title">Events</h2>
  <p id="hero-subtitle">Community gatherings, celebrations &amp; special occasions</p>
</div>

<main id="events-main" class="page-main">
  <div class="loading">Loading events…</div>
</main>

<footer>© <span id="year"></span> Wu's Tai Chi Chuan Academy Detroit</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  fetch('events-data.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) { render(data); })
    .catch(function(err) {
      document.getElementById('events-main').innerHTML =
        '<div class="error"><strong>Could not load events data.</strong> Make sure <code>events-data.json</code> is in the same folder as this page. (' + err.message + ')</div>';
    });

  function render(data) {
    document.getElementById('hero-title').textContent    = data.heroTitle    || 'Events';
    document.getElementById('hero-subtitle').textContent = data.heroSubtitle || '';

    var html = '';

    (data.events || []).forEach(function(ev) {
      html += '<div class="event-card">';
      html += '<div class="event-header">';
      if (ev.tag)         html += '<div class="event-tag">'  + ev.tag   + '</div>';
      if (ev.title)       html += '<h3>'                     + ev.title + '</h3>';
      if (ev.description) html += '<p>'                      + ev.description + '</p>';
      html += '</div>';

      if (ev.featuredImage) {
        html += '<img src="' + ev.featuredImage.src + '" alt="' + (ev.featuredImage.alt || '') + '" class="featured-img">';
      }

      if (ev.photos && ev.photos.length) {
        html += '<div class="photo-grid">';
        ev.photos.forEach(function(photo) {
          html += '<img src="' + photo.src + '" alt="' + (photo.alt || '') + '">';
        });
        html += '</div>';
      }

      html += '</div>';
    });

    if (!html) html = '<p style="color:var(--mid);text-align:center;padding:40px 0;">No events yet — check back soon.</p>';

    document.getElementById('events-main').innerHTML = html;
  }
</script>
</body>
</html>
