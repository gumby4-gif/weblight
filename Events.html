<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wu Tai Chi Chuan Academy Detroit — Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="preload" href="header.html" as="fetch" crossorigin>
  <style>
    :root{--gold:#B8954A;--gold-mid:#D4A85A;--gold-pale:#F7F0DC;--gold-softer:#EDE0BC;--ink:#1E1E1E;--ink-soft:#3A3A3A;--mid:#7A7260;--bg:#FAF6EC;--white:#FFFFFF;--border:#DDD0A8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lato',sans-serif;color:var(--ink);background:var(--bg);line-height:1.7;}



    .sub-nav{background:var(--gold-pale);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;}
    .back-home{font-size:0.82rem;color:var(--mid);text-decoration:none;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;margin-right:8px;}
    .back-home:visited{color:var(--mid);}
    .back-home:hover{color:var(--ink);}
    .divider-dot{color:var(--border);font-size:1rem;}
    .page-tabs{display:inline-flex;background:var(--white);border:1px solid var(--border);border-radius:50px;padding:4px;gap:3px;}
    .page-tabs a{display:inline-block;padding:8px 22px;border-radius:50px;text-decoration:none;font-size:0.84rem;font-weight:700;color:var(--ink-soft);transition:background 0.2s,color 0.2s;}
    .page-tabs a:visited{color:var(--ink-soft);}
    .page-tabs a:hover{background:var(--gold-softer);color:var(--ink);}
    .page-tabs a.active{background:var(--ink);color:#E8D58A;}

    .page-hero{background:linear-gradient(160deg,#C8A870,#DECAA5);padding:44px 40px 36px;text-align:center;}
    .page-hero h2{font-family:'Noto Serif SC',serif;font-size:clamp(1.5rem,3vw,2rem);color:#2A1F0A;margin-bottom:6px;}
    .page-hero p{color:#3A2A10;font-size:0.92rem;}

    main{max-width:900px;margin:0 auto;padding:50px 30px 60px;}

    .event-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:48px;}
    .event-header{padding:26px 30px 20px;}
    .event-tag{display:inline-block;background:var(--gold-pale);color:var(--gold);font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:10px;border:1px solid var(--border);}
    .event-header h3{font-family:'Noto Serif SC',serif;font-size:1.3rem;color:var(--ink);margin-bottom:10px;}
    .event-header p{color:var(--ink-soft);font-size:0.93rem;}
    .featured-img{width:100%;max-height:400px;object-fit:cover;display:block;}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:0;}
    .photo-grid img{width:100%;height:210px;object-fit:cover;display:block;transition:opacity 0.2s;}
    .photo-grid img:hover{opacity:0.88;}

    .loading{text-align:center;padding:60px 20px;color:var(--mid);font-size:0.95rem;}
    .error{background:#FFF0F0;border-left:3px solid #C0392B;border-radius:0 6px 6px 0;padding:14px 18px;font-size:0.9rem;color:#7B1E1E;margin-bottom:36px;}

    footer{background:#C8B088;color:#2A1F0A;text-align:center;padding:20px;font-size:0.82rem;border-top:1px solid #C0A070;}

    @media(max-width:640px){
      header,.sub-nav{padding:12px 18px;}
      .page-hero{padding:36px 20px 28px;}
      main{padding:36px 18px 50px;}
      .event-header{padding:20px;}
      .photo-grid{grid-template-columns:1fr 1fr;}
      .page-tabs a{padding:7px 14px;font-size:0.8rem;}
    }
  </style>
</head>

<body>
  <script>
    fetch('header.html')
      .then(function(r){ return r.text(); })
      .then(function(html){
        document.body.insertAdjacentHTML('afterbegin', html);
        /* insertAdjacentHTML does NOT execute <script> tags, so we
           re-run any scripts that were inside the fetched fragment. */
        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        tmp.querySelectorAll('script').forEach(function(oldScript) {
          var newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          document.head.appendChild(newScript);
          document.head.removeChild(newScript);
        });
      });
</script>



<div class="sub-nav">
  <a href="index.html#top" class="back-home"><img src="Images/Tai_Chi_Home.png" width="50" height="50" alt="Home"></a>
  <span class="divider-dot">·</span>
  <nav class="page-tabs">
    <a href="Schedule.html">📅 Schedule</a>
    <a href="Fees.html">💰 Fees</a>
    <a href="Events.html" class="active">🎉 Events</a>
  </nav>
</div>

<div class="page-hero">
  <h2 id="hero-title">Events</h2>
  <p id="hero-subtitle">Community gatherings, celebrations &amp; special occasions</p>
</div>

<main id="events-main">
  <div class="loading">Loading events…</div>
</main>

<footer>© <span id="year"></span> Wu's Tai Chi Chuan Academy Detroit</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  fetch('events-data.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) { render(data); })
    .catch(function(err) {
      document.getElementById('events-main').innerHTML =
        '<div class="error"><strong>Could not load events data.</strong> Make sure <code>events-data.json</code> is in the same folder as this page. (' + err.message + ')</div>';
    });

  function render(data) {
    document.getElementById('hero-title').textContent    = data.heroTitle    || 'Events';
    document.getElementById('hero-subtitle').textContent = data.heroSubtitle || '';

    var html = '';

    (data.events || []).forEach(function(ev) {
      html += '<div class="event-card">';
      html += '<div class="event-header">';
      if (ev.tag)         html += '<div class="event-tag">'  + ev.tag   + '</div>';
      if (ev.title)       html += '<h3>'                     + ev.title + '</h3>';
      if (ev.description) html += '<p>'                      + ev.description + '</p>';
      html += '</div>';

      if (ev.featuredImage) {
        html += '<img src="' + ev.featuredImage.src + '" alt="' + (ev.featuredImage.alt || '') + '" class="featured-img">';
      }

      if (ev.photos && ev.photos.length) {
        html += '<div class="photo-grid">';
        ev.photos.forEach(function(photo) {
          html += '<img src="' + photo.src + '" alt="' + (photo.alt || '') + '">';
        });
        html += '</div>';
      }

      html += '</div>';
    });

    if (!html) html = '<p style="color:var(--mid);text-align:center;padding:40px 0;">No events yet — check back soon.</p>';

    document.getElementById('events-main').innerHTML = html;
  }
</script>
</body>
</html>
