<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hash Scroll Debug</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    window._log = [];
    function log(msg) {
      window._log.push(Date.now() + ': ' + msg);
      var el = document.getElementById('log');
      if (el) el.innerHTML = window._log.join('<br>');
      console.log(msg);
    }

    log('HEAD script: hash=' + window.location.hash + ' readyState=' + document.readyState);
    if (window.location.hash) {
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      window.scrollTo(0, 0);
      log('HEAD script: called scrollTo(0,0), scrollRestoration=manual');
    }
  </script>
</head>
<body>

<script>
  var _hash = window.location.hash;
  log('BODY script start: hash=' + _hash + ' scrollY=' + window.scrollY + ' readyState=' + document.readyState);

  fetch('header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      log('fetch complete: scrollY=' + window.scrollY + ' readyState=' + document.readyState);
      document.body.insertAdjacentHTML('afterbegin', html);
      log('after insertAdjacentHTML: scrollY=' + window.scrollY);

      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      tmp.querySelectorAll('script').forEach(function(oldScript) {
        var newScript = document.createElement('script');
        if (oldScript.src) newScript.src = oldScript.src;
        else newScript.textContent = oldScript.textContent;
        document.body.appendChild(newScript);
      });

      if (_hash) {
        function doScroll() {
          var target = document.querySelector(_hash);
          var headerEl = document.querySelector('header');
          var headerH = headerEl ? headerEl.getBoundingClientRect().height : 0;
          log('doScroll: readyState=' + document.readyState
            + ' target=' + (target ? 'FOUND' : 'NULL')
            + ' headerH=' + headerH
            + ' scrollY=' + window.scrollY);
          if (target) {
            var rect = target.getBoundingClientRect();
            log('target rect.top=' + rect.top + ' scrollY=' + window.scrollY);
            var top = rect.top + window.scrollY - headerH;
            log('scrolling to top=' + top);
            window.scrollTo({ top: top, behavior: 'auto' });
            setTimeout(function(){ log('after scroll: scrollY=' + window.scrollY); }, 100);
          }
        }
        log('readyState before scroll decision: ' + document.readyState);
        if (document.readyState === 'complete') {
          doScroll();
        } else {
          log('waiting for load event...');
          window.addEventListener('load', function() {
            log('load event fired: scrollY=' + window.scrollY);
            doScroll();
          }, { once: true });
        }
      }
    });
</script>

<!-- Fake content to simulate page height before sections -->
<div style="height:600px;background:#eee;display:flex;align-items:center;justify-content:center;">
  <h2>Splash / Hero area (600px tall)</h2>
</div>
<div style="height:400px;background:#ddd;display:flex;align-items:center;justify-content:center;">
  <h2>Benefits section (400px tall)</h2>
</div>

<section id="history" style="background:#DECAA5;padding:60px 40px;">
  <h2>History Section — THIS IS THE TARGET</h2>
  <p>If scrolling works, you should land here.</p>
</section>

<div style="height:400px;background:#eee;"></div>
<section id="contact" style="background:#ccc;padding:60px 40px;">
  <h2>Contact Section</h2>
</section>
<div style="height:400px;"></div>

<div id="log" style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font-family:monospace;font-size:11px;padding:10px;max-height:200px;overflow-y:auto;z-index:9999;"></div>

</body>
</html>
