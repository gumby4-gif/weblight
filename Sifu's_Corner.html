<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wu Tai Chi Chuan Academy Detroit — Sifu's Corner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ── Shared header injected from header.html ── -->
  <script>
    fetch('header.html')
      .then(function(r){ return r.text(); })
      .then(function(html){
        document.body.insertAdjacentHTML('afterbegin', html);
        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        tmp.querySelectorAll('script').forEach(function(oldScript){
          var newScript = document.createElement('script');
          if(oldScript.src){ newScript.src = oldScript.src; }
          else { newScript.textContent = oldScript.textContent; }
          document.head.appendChild(newScript);
          document.head.removeChild(newScript);
        });
      });
  </script>

  <!-- ── Page hero ── -->
  <div class="page-hero">
    <h2>Sifu's Corner</h2>
    <div class="hero-chinese">底特律師傅</div>
    <p>Words from our instructor</p>
  </div>

  <!-- ── Main content ── -->
  <main class="page-main">

    <!-- Sifu profile card -->
    <div class="sifu-profile">
      <img src="Images/MichaelAshmore.jpg" alt="Sifu Michael Ashmore">
      <div class="sifu-profile-text">
        <h3>Sifu Michael Ashmore</h3>
      </div>
    </div>

    <p class="greeting">Greetings!</p>

    <!-- Message loaded from Sifu's_Corner.txt -->
    <div id="sifu-message">
      <p style="color:var(--mid);text-align:center;">Loading message…</p>
    </div>

    <p class="closing">Cheers!</p>

    <div class="info-box">📍 3140 Hilton Road, Ferndale, MI 48220 &nbsp;·&nbsp; 📞 248-854-3953</div>

  </main>

  <footer>© <span id="year"></span> Wu's Tai Chi Chuan Academy Detroit</footer>

  <!-- ── Scripts at end of body ── -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <script>
    fetch("Sifu's_Corner.txt")
      .then(function(r){
        if(!r.ok) throw new Error("Could not load Sifu's_Corner.txt (HTTP " + r.status + ")");
        return r.text();
      })
      .then(function(text){
        var paragraphs = text
          .split(/\n\s*\n/)
          .map(function(p){ return p.trim(); })
          .filter(function(p){ return p.length > 0; });

        var html = paragraphs
          .map(function(p){ return '<p>' + p + '</p>'; })
          .join('\n');

        document.getElementById('sifu-message').innerHTML = html;
      })
      .catch(function(err){
        document.getElementById('sifu-message').innerHTML =
          '<p style="color:#8B2020;background:#fff5f5;border:1px solid #e8b4b4;border-radius:6px;padding:16px;font-size:0.9rem;">' +
          '<strong>Message could not be loaded.</strong> Please check that <code>Sifu\'s_Corner.txt</code> is in the same folder.<br>' +
          '<small style="opacity:0.7">' + err.message + '</small></p>';
      });
  </script>

</body>
</html>
