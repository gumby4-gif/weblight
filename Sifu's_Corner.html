<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sifu's Corner — Wu's Tai Chi Chuan Academy Detroit</title>
  <meta name="description" content="A personal message from Sifu Michael Ashmore, head instructor at Wu's Tai Chi Chuan Academy Detroit.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="styles.css">
</head>

<body data-page="sifu">

<div id="site-header"></div>
<script>
  fetch('header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      var el = document.getElementById('site-header');
      el.innerText = html;
      el.querySelectorAll('script').forEach(function(orig) {
        var s = document.createElement('script');
        s.textContent = orig.textContent;
        document.head.appendChild(s);
      });
    });
</script>

<main>

  <!-- PAGE HERO -->
  <div class="page-hero sifu-page-hero">
    <p class="zen-eyebrow" style="text-align:center;margin-bottom:10px;">底特律師傅</p>
    <h2>Sifu's Corner</h2>
  </div>

  <!-- SUB-NAV -->
  <div class="sub-nav">
    <a href="index.html" class="back-home">← Home</a>
    <span class="divider-dot">·</span>
    <span style="font-size:0.82rem;color:var(--crimson);">Sifu's Corner</span>
  </div>

  <div class="page-main">

    <!-- Sifu profile card -->
    <div class="sifu-profile">
      <img src="Images/MichaelAshmore.jpg" alt="Sifu Michael Ashmore">
      <div class="sifu-profile-text">
        <h3>Sifu Michael Ashmore</h3>
      </div>
    </div>

    <p class="greeting">Greetings!</p>

    <!-- Message loaded from Sifu's_Corner.txt -->
    <div id="sifu-message">
      <p style="color:var(--charcoal-mid);text-align:center;">Loading message…</p>
    </div>

    <p class="closing">Cheers!</p>

  </div><!-- /.page-main -->
</main>

<div id="site-footer"></div>
<script>
  fetch('footer.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.getElementById('site-footer').innerText = html;
    });
</script>

<script>
  fetch("Sifu's_Corner.txt")
    .then(function(r){
      if(!r.ok) throw new Error("Could not load Sifu's_Corner.txt (HTTP " + r.status + ")");
      return r.text();
    })
    .then(function(text){
      var paragraphs = text
        .split(/\n\s*\n/)
        .map(function(p){ return p.trim(); })
        .filter(function(p){ return p.length > 0; });

      var html = paragraphs
        .map(function(p){ return '<p>' + p + '</p>'; })
        .join('\n');

      document.getElementById('sifu-message').innerText = html;
    })
    .catch(function(err){
      document.getElementById('sifu-message').innerText =
        '<p style="color:#8B2020;background:#fff5f5;border:1px solid #e8b4b4;border-radius:6px;padding:16px;font-size:0.9rem;">' +
        '<strong>Message could not be loaded.</strong> Please check that Sifu\'s_Corner.txt is in the same folder.<br>' +
        '<small style="opacity:0.7">' + err.message + '</small></p>';
    });
</script>
</body>
</html>
