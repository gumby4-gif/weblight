<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wu Tai Chi Chuan Academy Detroit — Sifu's Corner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="preload" href="header.html" as="fetch" crossorigin>

  <style>
    :root{--gold:#B8954A;--gold-mid:#D4A85A;--gold-pale:#F7F0DC;--gold-softer:#EDE0BC;--ink:#1E1E1E;--ink-soft:#3A3A3A;--mid:#7A7260;--bg:#FAF6EC;--white:#FFFFFF;--border:#DDD0A8;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lato',sans-serif;color:var(--ink);background:var(--bg);line-height:1.7;}

    /* ── Shared header styles (matches Schedule.html) ── */
    header{background:var(--bg);border-bottom:2px solid var(--gold-softer);display:flex;align-items:center;padding:16px 40px;gap:14px;}
    .header-brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .header-brand img{width:46px;height:46px;object-fit:contain;}
    .header-brand-text h1{font-family:'Noto Serif SC',serif;font-size:1.05rem;color:var(--ink);line-height:1.3;font-weight:700;}
    .header-brand-text p{font-size:0.74rem;color:var(--mid);letter-spacing:0.06em;text-transform:uppercase;}



    /* ── Page hero ── */
    .page-hero{background:linear-gradient(160deg,#C8A870,#DECAA5);padding:44px 40px 36px;text-align:center;}
    .page-hero h2{font-family:'Noto Serif SC',serif;font-size:clamp(1.5rem,3vw,2rem);color:#2A1F0A;margin-bottom:6px;}
    .page-hero .hero-chinese{font-family:'Noto Serif SC',serif;font-size:1.1rem;color:#a30904ea;margin-bottom:10px;}
    .page-hero p{color:#3A2A10;font-size:0.92rem;}

    /* ── Main content ── */
    main{max-width:780px;margin:0 auto;padding:50px 30px 60px;}

    /* ── Sifu profile card ── */
    .sifu-profile{display:flex;align-items:center;gap:20px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:32px;}
    .sifu-profile img{width:80px;height:80px;object-fit:cover;border-radius:6px;border:2px solid var(--gold-softer);flex-shrink:0;}
    .sifu-profile-text h3{font-family:'Noto Serif SC',serif;font-size:1.05rem;color:var(--ink);margin-bottom:2px;}
    .sifu-profile-text p{font-size:0.84rem;color:var(--mid);}

    /* ── Message body ── */
    .greeting{font-family:'Noto Serif SC',serif;font-size:1rem;color:var(--ink);margin-bottom:18px;}
    .closing{font-family:'Noto Serif SC',serif;font-size:1rem;color:var(--ink);margin-top:24px;margin-bottom:4px;}

    #sifu-message p{font-size:0.95rem;color:var(--ink-soft);margin-bottom:1em;line-height:1.8;}

    /* ── Info box ── */
    .info-box{background:var(--gold-pale);border:1px solid var(--border);border-radius:6px;padding:15px 20px;font-size:0.88rem;color:var(--ink-soft);margin-top:32px;}

    /* ── Footer ── */
    footer{background:#C8B088;color:#2A1F0A;text-align:center;padding:20px;font-size:0.82rem;border-top:1px solid #C0A070;}

    /* ── Mobile ── */
    @media(max-width:768px){
      header{padding:12px 18px;}
      .page-hero{padding:36px 20px 28px;}
      main{padding:36px 18px 50px;}
      .sifu-profile{flex-direction:column;text-align:center;}
    }
  </style>
</head>

<body>

  <!-- ── Shared header injected from header.html ── -->
  <script>
    fetch('header.html')
      .then(function(r){ return r.text(); })
      .then(function(html){
        document.body.insertAdjacentHTML('afterbegin', html);
        var tmp = document.createElement('div');
        tmp.innerHTML = html;
        tmp.querySelectorAll('script').forEach(function(oldScript){
          var newScript = document.createElement('script');
          if(oldScript.src){ newScript.src = oldScript.src; }
          else { newScript.textContent = oldScript.textContent; }
          document.head.appendChild(newScript);
          document.head.removeChild(newScript);
        });
      });
  </script>

  <!-- ── Page hero ── -->
  <div class="page-hero">
    <h2>Sifu's Corner</h2>
    <div class="hero-chinese">底特律師傅</div>
    <p>Words from our instructor</p>
  </div>

  <!-- ── Main content ── -->
  <main>

    <!-- Sifu profile card -->
    <div class="sifu-profile">
      <img src="Images/MichaelAshmore.jpg" alt="Sifu Michael Ashmore">
      <div class="sifu-profile-text">
        <h3>Sifu Michael Ashmore</h3>
      </div>
    </div>

    <p class="greeting">Greetings!</p>

    <!-- Message loaded from Sifu's_Corner.txt -->
    <div id="sifu-message">
      <p style="color:var(--mid);text-align:center;">Loading message…</p>
    </div>

    <p class="closing">Cheers!</p>

    <div class="info-box">📍 3140 Hilton Road, Ferndale, MI 48220 &nbsp;·&nbsp; 📞 248-854-3953</div>

  </main>

  <footer>© <span id="year"></span> Wu's Tai Chi Chuan Academy Detroit</footer>

  <!-- ── Scripts at end of body ── -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

  <script>
    fetch("Sifu's_Corner.txt")
      .then(function(r){
        if(!r.ok) throw new Error("Could not load Sifu's_Corner.txt (HTTP " + r.status + ")");
        return r.text();
      })
      .then(function(text){
        var paragraphs = text
          .split(/\n\s*\n/)
          .map(function(p){ return p.trim(); })
          .filter(function(p){ return p.length > 0; });

        var html = paragraphs
          .map(function(p){ return '<p>' + p + '</p>'; })
          .join('\n');

        document.getElementById('sifu-message').innerHTML = html;
      })
      .catch(function(err){
        document.getElementById('sifu-message').innerHTML =
          '<p style="color:#8B2020;background:#fff5f5;border:1px solid #e8b4b4;border-radius:6px;padding:16px;font-size:0.9rem;">' +
          '<strong>Message could not be loaded.</strong> Please check that <code>Sifu\'s_Corner.txt</code> is in the same folder.<br>' +
          '<small style="opacity:0.7">' + err.message + '</small></p>';
      });
  </script>

</body>
</html>
